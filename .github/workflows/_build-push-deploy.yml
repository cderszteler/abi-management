name: "_build-push-deploy"

on:
  workflow_call:
    inputs:
      build_tags:
        description: "Newline-separated docker tags to build+push"
        required: true
        type: string
      deploy_image:
        description: "Full docker image reference the server should pull (e.g. repo:tag)"
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SERVER_HOST:
        required: true
      SERVER_USER:
        required: true
      SERVER_SSH_KEY:
        required: true
      SERVER_APP_DIR:
        required: true
      SERVER_PORT:
        required: false

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ inputs.build_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy (pull + restart on server)
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_IMAGE: ${{ inputs.deploy_image }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: DOCKER_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,SERVER_APP_DIR
          script: |
            set -euo pipefail

            cd "$SERVER_APP_DIR"

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            # Split "repo:tag" for compose.prod.yml
            DOCKER_IMAGE_NAME="${DOCKER_IMAGE%:*}"
            DOCKER_IMAGE_TAG="${DOCKER_IMAGE##*:}"

            printf "DOCKER_IMAGE_NAME=%s\nDOCKER_IMAGE_TAG=%s\n" "$DOCKER_IMAGE_NAME" "$DOCKER_IMAGE_TAG" > .env.deploy
            docker compose --env-file .env.deploy -f compose.prod.yml pull frontend
            docker compose --env-file .env.deploy -f compose.prod.yml up -d --remove-orphans
            rm -f .env.deploy

            docker image prune -f

